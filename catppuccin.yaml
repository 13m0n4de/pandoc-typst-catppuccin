from: markdown
to: pdf
pdf-engine: typst

template: catppuccin.typst

variables:
  # latte, frappe, macchiato, mocha
  flavor: macchiato

  mainfont: LXGW Bright
  codefont: Hack Nerd Font
  fontsize: 11pt

  lang: zh
  region: CN

  papersize: a4
  columns: 1

  margin:
    top: 1.5cm
    bottom: 1.5cm
    left: 1.5cm
    right: 1.5cm

  page-numbering: "1"
